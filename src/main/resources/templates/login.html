<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>VYMS | Login</title>
	<link rel="stylesheet" href="/css/login.css" th:href="@{/css/login.css}">
</head>
<body>
<!-- Login page layout -->
<div class="login-page">
	<div class="login-shell">
		<!-- Left hero panel -->
		<aside class="login-hero">
			<img class="hero-image" src="/images/logo.png" th:src="@{/images/logo.png}" alt="YOMIRU Logo">
			<div class="hero-copy">
				<p class="hero-eyebrow">Vehicle Yard Management</p>
				<h1>Welcome back</h1>
				<p class="hero-sub">Sign in to access dashboards for your role.</p>
			</div>
		</aside>

		<!-- Login form card -->
		<main class="login-card">
			<div class="login-card-logo">
				<img src="/images/logo.png" th:src="@{/images/logo.png}" alt="YOMIRU Logo">
			</div>
			<h3 class="login-heading">Sign in</h3>
			<p class="login-sub">Use your email and password to continue.</p>

			<div class="alert-error" th:if="${param.error}">
				Invalid email or password. Please try again.
			</div>

			<form th:action="@{/login}" method="post" th:object="${user}">
				<div class="form-group">
					<label for="email">Email</label>
					<input id="email" name="email" type="email" th:field="*{email}" placeholder="you@example.com" required>
				</div>

				<div class="form-group pw-wrap">
					<label for="password">Password</label>
					<input id="password" name="password" type="password" th:field="*{password}" placeholder="••••••••" required>
					<button type="button" class="pw-toggle" aria-label="Show password" onclick="togglePw()">👁</button>
				</div>

				<button class="btn-signin" type="submit">Sign in</button>
			</form>

			<div class="login-footer">
				<p class="footer-brand">Vehicle Yard Management System</p>
			</div>
		</main>
	</div>
</div>

<script>
    // Toggle password visibility for the login field.
	function togglePw() {
		const pwInput = document.getElementById('password');
		pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
	}
</script>
    <script src="/js/language-switcher.js"></script>
</body>
</html>
