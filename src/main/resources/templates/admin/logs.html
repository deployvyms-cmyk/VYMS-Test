<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>System Logs - Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Page container for logs */
        .logs-shell {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 8px;
        }

        .logs-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
        }

        .logs-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Sidebar layout overrides */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 250px;
            background: var(--bg-sidebar);
            padding: 24px;
            border-right: 1px solid var(--border);
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            margin-bottom: 32px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: var(--bg-avatar);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 18px;
            color: var(--text-avatar);
            margin-right: 12px;
        }

        .user-info h3 {
            margin: 0;
            font-size: 16px;
            color: var(--text-title);
        }

        .user-info p {
            margin: 4px 0 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            margin-bottom: 16px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-link);
            font-weight: 500;
        }

        .nav-link i {
            margin-right: 8px;
        }

        .sidebar-footer {
            margin-top: auto;
        }

        /* Log list table styles */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--bg-header);
            color: var(--text-header);
        }

        tr:hover {
            background: var(--bg-row-hover);
        }
    </style>
</head>

<body>
    <!-- Sidebar navigation -->
    <aside class="sidebar">
        <div class="sidebar-user">
            <div class="user-avatar">AU</div>
            <div class="user-info">
                <h3 th:text="${currentUser != null ? currentUser.username : 'Admin User'}">Admin User</h3>
                <p th:text="${currentUser != null && currentUser.role != null ? currentUser.role : 'Admin'}">Admin</p>
            </div>
        </div>
        <ul class="nav-links">
            <li class="nav-item"><a href="/admin" class="nav-link"><i class="fas fa-tachometer-alt"></i>
                    Dashboard</a></li>
            <li class="nav-item"><a href="/admin/users" class="nav-link"><i class="fas fa-users"></i>
                    Manage Users</a></li>
            <li class="nav-item"><a href="/admin/logs" class="nav-link active"><i class="fas fa-file-alt"></i>
                    System Logs</a></li>
            <li class="nav-item"><a th:href="@{/profile}" class="nav-link"><i class="fas fa-user"></i>
                    Profile</a></li>
        </ul>
        <div class="sidebar-footer"><a th:href="@{/logout}" class="nav-link"><i class="fas fa-sign-out-alt"></i>
                Logout</a></div>
    </aside>

    <!-- Main log list content -->
    <main class="logs-shell">
        <div class="page-header" style="margin-bottom:18px;">
            <div class="page-title">
                <h1>System Logs</h1>
                <p>Track important events and audit status updates</p>
            </div>
            <div class="logs-nav">
                <a href="/admin" class="btn btn-outline" style="text-decoration:none;">
                    Back to Dashboard
                </a>
                <a href="/admin/users" class="btn btn-primary" style="text-decoration:none;">
                    Manage Users
                </a>
            </div>
        </div>

        <div class="logs-card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Timestamp</th>
                        <th>Type</th>
                        <th>Description</th>
                        <th>User</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="log : ${logs}">
                        <td th:text="${log.id}">1</td>
                        <td th:text="${log.timestamp}">2026-02-27T10:00:00</td>
                        <td th:text="${log.type}">LOGIN</td>
                        <td th:text="${log.description}">Description</td>
                        <td th:text="${log.user}">Admin</td>
                        <td th:text="${log.status}">SUCCESS</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(logs)}">
                        <td colspan="6" style="text-align:center; color: var(--text-muted);">No logs found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>

</html>
