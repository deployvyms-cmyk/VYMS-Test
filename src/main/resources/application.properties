spring.application.name=vyms
server.port=${PORT:8081}

# PostgreSQL / Supabase Database settings
# NOTE: Supabase direct connections use IPv6-only. If your local network does not support IPv6, 
# you MUST use the Supavisor Pooler URL (resolves to IPv4 & IPv6).
# Copy the pooled JDBC connection string from your Supabase Dashboard: Settings -> Database -> Connection pooling.
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres.hnmoasgpcouruummovln
spring.datasource.password=gfCPtRvCpXhZymoy

# JPA and Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Explicit dialect avoids startup issues when JDBC metadata is not available
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Local upload directory for images and files
app.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail (SMTP) settings for invoice emails (Port 587 with certificate bypass is highly robust on Railway/Docker base images)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:DeployVYMS@gmail.com}
spring.mail.password=${SMTP_PASSWORD:wljluuqxxcffcnzc}
app.mail.from=${SMTP_FROM:DeployVYMS@gmail.com}
app.mail.web-url=${SMTP_WEB_URL:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.default-encoding=UTF-8



